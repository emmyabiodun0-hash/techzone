{% extends 'base.html' %}

{% block style %}
<style>

body{
    font-family: Arial, sans-serif;
    background:#FFF4EC;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card */
form{
    display:flex;
    flex-direction:column;
    gap:12px;
    width:360px;
    background:white;
    padding:35px;
    border-radius:18px;
    border:1px solid #FFD2B3;
    box-shadow:0 8px 25px rgba(255,107,0,0.12);
    text-align:center;
}

/* Input */
input[type="text"]{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #FFD2B3;
    background:#FFF8F3;
    outline:none;
    font-size:14px;
    transition:0.3s;
}

input[type="text"]:focus{
    border-color:#FF6B00;
    box-shadow:0 0 6px rgba(255,107,0,0.25);
}

/* Button */
input[type="submit"]{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#FF6B00;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

input[type="submit"]:hover{
    background:#E65F00;
}


h2{
    color:#FF6B00;
    margin-bottom:10px;
}

</style>
{% endblock %}

{% block content %}

<form action="" method="post">

    <h2>Reset Password</h2>

    <input type="text" name="password" placeholder="Enter new password">

    <input type="submit" value="Verify">

</form>

{% endblock %}
