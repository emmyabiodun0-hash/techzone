{% extends 'base.html' %}

{% block style %}
<style>

body{
    font-family: Arial, sans-serif;
    background:#FFF4EC;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:20px;
}

/* Card */
form{
    display:flex;
    flex-direction:column;
    gap:12px;
    width:100%;
    max-width:360px;
    background:white;
    padding:35px;
    border-radius:18px;
    border:1px solid #FFD2B3;
    box-shadow:0 8px 25px rgba(255,107,0,0.12);
    text-align:center;
    box-sizing:border-box;
}

/* Title */
h2{
    color:#FF6B00;
    margin-bottom:10px;
}

/* Input */
input[type="text"],
input[type="password"]{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #FFD2B3;
    background:#FFF8F3;
    outline:none;
    font-size:14px;
    transition:0.3s;
    box-sizing:border-box;
}

input[type="text"]:focus,
input[type="password"]:focus{
    border-color:#FF6B00;
    box-shadow:0 0 6px rgba(255,107,0,0.25);
}

/* Button */
input[type="submit"]{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#FF6B00;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

input[type="submit"]:hover{
    background:#E65F00;
}

/* 🔥 Mobile responsiveness */
@media (max-width: 480px){
    form{
        padding:22px;
        border-radius:14px;
    }

    h2{
        font-size:20px;
    }

    input{
        font-size:14px;
        padding:11px;
    }
}

</style>
{% endblock %}

{% block content %}

<form action="" method="post">

    <h2>Reset Password</h2>

    <input type="password" name="password" placeholder="Enter new password" required>

    <input type="submit" value="Reset Password">

</form>

{% endblock %}
