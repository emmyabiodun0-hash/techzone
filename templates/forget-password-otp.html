{% extends 'base.html' %}

{% block style %}
<style>

body{
    font-family: Arial, sans-serif;
    background:#FFF4EC;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card */
.container{
    width:360px;
    background:white;
    padding:35px;
    border-radius:18px;
    border:1px solid #FFD2B3;
    box-shadow:0 8px 25px rgba(255,107,0,0.12);
    text-align:center;
}

/* Title */
h2{
    color:#FF6B00;
    margin-bottom:20px;
}

/* Input */
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #FFD2B3;
    background:#FFF8F3;
    outline:none;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    border-color:#FF6B00;
    box-shadow:0 0 6px rgba(255,107,0,0.25);
}

/* Button */
button{
    width:100%;
    margin-top:18px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#FF6B00;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#E65F00;
}

/* Small text */
p{
    font-size:13px;
    color:#777;
    margin-top:12px;
}

</style>
{% endblock %}

{% block content %}

<div class="container">

<h2>Forgot Password</h2>

<form method="POST">

<input type="email" name="email" placeholder="Enter your email" required>

<button type="submit">Send OTP</button>

</form>

<p>We will send a verification code to your email.</p>

</div>

{% endblock %}
